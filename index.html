<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Weather</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1 id="city">Detecting Location...</h1>

    <div class="current">
        <h2 id="temp">--°C</h2>
        <p id="wind">Loading...</p>
    </div>

    <h3>Next Hours</h3>
    <div id="hourly" class="row"></div>

    <h3>7 Day Forecast</h3>
    <div id="daily" class="row"></div>
</div>

<script src="script.js"></script>
</body>
</html>
