<div class="top">

    <!-- Left Side -->
    <div class="left">

        <!-- Weather Icon -->
        <div class="weather-icon" id="mainIcon">☀️</div>

        <!-- Temperature + Stats -->
        <div class="temp-wrap">

            <div class="temp-line">
                <span id="temp">37</span>
                <span class="unit">°C | °F</span>
            </div>

            <div id="stats">
                <div>Precipitation: 10%</div>
                <div>Humidity: 26%</div>
                <div>Wind: 13 km/h</div>
            </div>

        </div>

    </div>

    <!-- Right Side -->
    <div class="right">
        <h2>Weather</h2>
        <div id="dayName">Monday</div>
        <div id="summary">Sunny</div>
    </div>

</div>
