<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live Weather</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">

<div class="location">
📍 <span id="loc">Detecting...</span>
</div>

<div class="row">

<div class="icon" id="icon">☁️</div>

<div class="tempwrap">
<div class="temp" id="temp">--</div>
<div class="unit">°C | °F</div>
</div>

<div class="stats">
<div id="rain">Precipitation: --%</div>
<div id="hum">Humidity: --%</div>
<div id="wind">Wind: -- km/h</div>
</div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
